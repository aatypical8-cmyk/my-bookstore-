{% extends 'books/base.html' %}

{% block title %}Reading: {{ book.title }}{% endblock %}

{% block content %}
<div class="container-fluid p-0">
    <div class="bg-dark text-white py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="mb-0">{{ book.title }}</h4>
            <a href="{% url 'book_detail' book.pk %}" class="btn btn-light">← Back</a>
        </div>
    </div>

    <div class="container mt-4">
        {% if book.ebook_file %}
            <div class="ratio ratio-16x9" style="height: 80vh;">
                <iframe
                    src="https://mozilla.github.io/pdf.js/web/viewer.html?file={{ book.ebook_file.url|urlencode }}"
                    style="border: none;"
                    allowfullscreen>
                </iframe>
            </div>
        {% else %}
            <div class="alert alert-danger text-center">
                <h4>No ebook file available</h4>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
