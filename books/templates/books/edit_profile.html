{% extends 'books/base.html' %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <h2>Edit Profile</h2>

                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Bio</label>
                            <textarea name="bio" class="form-control" rows="4">{{ profile.bio }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" name="phone_number" class="form-control"
                                   value="{{ profile.phone_number }}" placeholder="0712345678">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">M-Pesa Number (for receiving payments)</label>
                            <input type="text" name="mpesa_number" class="form-control"
                                   value="{{ profile.mpesa_number }}" placeholder="0712345678">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Profile Picture</label>
                            <input type="file" name="profile_picture" class="form-control" accept="image/*">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            Save Changes
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
